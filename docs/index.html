<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Drum Machine — 量子回路ドラムパターン生成</title>
    <meta name="description" content="量子回路（PQC）が生成するドラムパターンをブラウザ上でリアルタイムに可視化・可聴化。音ゲー風ビジュアライゼーション付き。">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="index.css">

    <!-- Favicon (quantum atom emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚛</text></svg>">
</head>
<body>
    <div id="app">
        <!-- ===== Header ===== -->
        <header id="header">
            <div class="logo">
                <span class="logo-icon">⚛</span>
                <h1>Quantum Drum Machine</h1>
            </div>
            <p class="subtitle">量子回路が奏でるドラムパターン</p>
        </header>

        <!-- ===== Main Content ===== -->
        <main id="main">
            <!-- ── Control Panel (Suno AI style) ── -->
            <aside id="control-panel">
                <div class="glass-panel">
                    <h2>Parameters</h2>

                    <!-- Part Selection -->
                    <div class="control-group">
                        <label>Drum Parts</label>
                        <div class="part-toggles">
                            <button class="part-toggle active" data-part="kick" id="toggle-kick"
                                    data-tooltip="Bass Drum">Kick</button>
                            <button class="part-toggle active" data-part="snare" id="toggle-snare"
                                    data-tooltip="Snare Drum">Snare</button>
                            <button class="part-toggle" data-part="tom" id="toggle-tom"
                                    data-tooltip="Low Tom">Tom</button>
                            <button class="part-toggle active" data-part="hh" id="toggle-hh"
                                    data-tooltip="Closed Hi-Hat">HH</button>
                            <button class="part-toggle" data-part="crash" id="toggle-crash"
                                    data-tooltip="Crash Cymbal">Crash</button>
                            <button class="part-toggle" data-part="ride" id="toggle-ride"
                                    data-tooltip="Ride Cymbal">Ride</button>
                        </div>
                    </div>

                    <!-- BPM -->
                    <div class="control-group">
                        <label>BPM <span class="value" id="bpm-value">120</span></label>
                        <input type="range" id="bpm-slider" min="60" max="200" value="120" class="slider">
                    </div>

                    <!-- Measures -->
                    <div class="control-group">
                        <label>Measures <span class="value" id="measures-value">4</span></label>
                        <input type="range" id="measures-slider" min="1" max="16" value="4" class="slider">
                    </div>

                    <!-- Quantum Noise -->
                    <div class="control-group">
                        <label>Quantum Noise <span class="value" id="noise-value">0.00</span></label>
                        <input type="range" id="noise-slider" min="0" max="100" value="0" class="slider">
                    </div>

                    <!-- Velocity -->
                    <div class="control-group">
                        <label>Velocity <span class="value" id="velocity-value">80</span></label>
                        <input type="range" id="velocity-slider" min="10" max="100" value="80" class="slider">
                    </div>

                    <!-- Generate Button -->
                    <button id="generate-btn" class="btn-generate">
                        <span class="btn-icon">⚡</span>
                        Generate
                    </button>

                    <!-- Playback Controls -->
                    <div class="playback-controls" id="playback-controls" style="display: none;">
                        <button id="play-btn" class="btn-play">▶ Play</button>
                        <button id="stop-btn" class="btn-stop">■ Stop</button>
                    </div>
                </div>
            </aside>

            <!-- ── Visualization Area ── -->
            <section id="viz-area">
                <!-- Quantum Circuit Visualization -->
                <div id="circuit-viz" class="glass-panel">
                    <canvas id="circuit-canvas"></canvas>
                </div>

                <!-- Drum Grid -->
                <div id="drum-grid" class="glass-panel">
                    <canvas id="grid-canvas"></canvas>
                </div>
            </section>
        </main>

        <!-- ===== Status Bar ===== -->
        <footer id="status-bar">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Loading parameters...</span>
        </footer>
    </div>

    <!-- ===== Scripts ===== -->
    <script src="js/quantum-sim.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
